version: '3.8'

services:
  frontend:
    build: ../frontend
    container_name: frontend
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
    depends_on:
      - backend

  backend:
    build: ../backend
    container_name: backend
    ports:
      - "8080:8080"
    volumes:
      - ../backend:/app
      - maven-repo:/root/.m2
    command: ./mvnw spring-boot:run
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: db
    ports:
      - "3307:3306"
    environment:
      # 本来であれば以下のようにenvファイルを読む形で情報を隠蔽する
      # - MYSQL_USER=${DB_USER} # .envの変数を展開
      # - MYSQL_PASSWORD=${DB_PASS} # .envの変数を展開
      - MYSQL_DATABASE=sampledb
      - MYSQL_USER=user
      - MYSQL_PASSWORD=pass
    volumes:
      - db-data:/var/lib/mysql      
      # 永続化用のマウント先
      - ./mysql_data:/var/lib/mysql
      # 初期データ
      - ./initdb.d:/docker-entrypoint-initdb.d

volumes:
  db-data:
  maven-repo: